{% extends "base.html" %}
{% load static %} 
 <title>{% block title %} Manage Users {% endblock %}</title>

{% block content %}
    <div class="text-center"> 
     <h3 class="mb-3">
        <i class="fa-solid fa-users"></i>Registered Users
     </h3>

     <table class="table table-striped table-hover">
        <thread class="table-success">
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thread>
        <tbody>
            {% for i in users %}
             <tr>
                <td>{{forloop.counter}}</td>
                
                <td>{{i.get_full_name}}</td>
                <td>{{i.username}}</td>
                <td>{{i.userprofile.phone}}</td>
                <td> <a href="{% url 'admin_user_delete' i.id %}" class="btn btn-outline-danger" 
                onclick="return confirm('delete this entry? This cannot be undone')">
                <i class="fa-solid fa-trash"></i>
                </a></td>
             </tr>

            {% endfor %}
     </table>           

    </div>   


{% endblock %}
